<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>College Admission Form</h1>
    <form action="">
        <label for="">Full Name:</label>
        <input type="text" required>
        <br><br>


        <label for="">Father's Name: </label>
        <input type="text" required>
        <br><br>


        <label for="">Email: </label>
        <input type="email" required>
        <br><br>


        <label for="">Mobile Number: </label>
        <input type="tel" required placeholder="12XXXXXXXX" maxlength="10" pattern="[0-9]{10}">
        <br><br>


        <label for="">Date Of Birth: </label>
        <input type="date" required>
        <br><br>


        <label for="male">Gender: </label>
        <input type="radio" id="male" value="male" name="gender"   required>Male
        <input type="radio" id="female" value="female" name="gender">Female
        <input type="radio" id="other" value="other" name="gender">Other
        <br><br>


        <label for="course">Select Course:</label>
        <select name="course" id="course" required>
            <option>B.Tech CSE</option>
            <option>B.Tech CSE</option>
            <option>MCA</option>
            <option>BCA</option>
        </select>
        <br><br>


        <label for="">Address:</label>
        <br>
        <textarea name="" id="" rows="4" cols="30" required></textarea>
        <br><br>


        <label for="">Hobbies: </label>
        <input type="checkbox">Sports
        <input type="checkbox">Music
        <input type="checkbox">Reading
        <br><br>


        <label for="">Upload Photo:  </label>
        <input type="file"   >
        <br><br>

        <label for="password">Password: </label>
        <input type="password" name="" id="password" required>
        <br><br>
        <input type="submit" value="submit">
        <input type="submit" value="Resest">
    </form>
</body>
</html>
